{% extends 'base.html' %} {% block content %}

<div style="margin-bottom: 1.5rem;">
  <a href="{% url 'home' %}"
    style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); font-weight: 500;">
    <span>←</span> Back to Student List
  </a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
  <h2 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">Add New Student</h2>

  <form method="POST">
    {% csrf_token %}

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" name="full_name" class="input-field" placeholder="e.g. John Doe" required />
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
      <div class="form-group">
        <label class="form-label">Roll Number</label>
        <input type="text" name="roll_number" class="input-field" placeholder="e.g. S12345" required />
      </div>
      <div class="form-group">
        <label class="form-label">Age</label>
        <input type="number" name="age" class="input-field" placeholder="e.g. 20" required />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="input-field" placeholder="e.g. john@example.com" required />
    </div>

    <div class="form-group">
      <label class="form-label">Course</label>
      <input type="text" name="course" class="input-field" placeholder="e.g. Computer Science" required />
    </div>

    <div class="form-group">
      <label class="form-label">Address</label>
      <textarea name="address" class="input-field" rows="3" placeholder="Enter complete address" required></textarea>
    </div>

    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
      <button type="submit" class="btn btn-primary" style="flex: 1;">Save Student Record</button>
      <a href="{% url 'home' %}" class="btn" style="background: #f1f5f9; color: var(--text-main);">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
