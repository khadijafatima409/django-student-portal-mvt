<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Portal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg:
          0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        line-height: 1.5;
        min-height: 100vh;
      }

      .navbar {
        background: var(--card-bg);
        border-bottom: 1px solid var(--border);
        padding: 1rem 2rem;
        position: sticky;
        top: 0;
        z-index: 50;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }

      .navbar-container {
        max-width: 1000px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .main-content {
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1.5rem;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 1.5rem;
        box-shadow: var(--shadow);
      }

      h1,
      h2,
      h3 {
        color: var(--text-main);
        font-weight: 700;
        margin-bottom: 1rem;
      }

      a {
        color: var(--primary);
        text-decoration: none;
        transition: color 0.2s;
      }

      a:hover {
        color: var(--primary-hover);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.625rem 1.25rem;
        font-weight: 500;
        border-radius: 0.5rem;
        transition: all 0.2s;
        cursor: pointer;
        border: none;
        gap: 0.5rem;
        font-size: 0.875rem;
      }

      .btn-primary {
        background-color: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background-color: var(--primary-hover);
        color: white;
        transform: translateY(-1px);
        box-shadow: var(--shadow);
      }

      .input-field {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        font-family: inherit;
        font-size: 0.875rem;
        transition:
          border-color 0.2s,
          ring 0.2s;
      }

      .input-field:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--text-main);
      }

      .student-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }

      .student-table th {
        text-align: left;
        padding: 0.75rem 1rem;
        background: #f1f5f9;
        font-weight: 600;
        color: var(--text-muted);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--border);
      }

      .student-table td {
        padding: 1rem;
        border-bottom: 1px solid var(--border);
      }

      .student-table tr:hover {
        background-color: #f8fafc;
      }

      .badge {
        padding: 0.25rem 0.5rem;
        border-radius: 0.25rem;
        font-size: 0.75rem;
        font-weight: 500;
        background: #e0f2fe;
        color: #0369a1;
      }

      footer {
        text-align: center;
        padding: 2rem;
        color: var(--text-muted);
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-container">
        <a href="{% url 'home' %}" class="logo">
          <span>🎓</span> StudentPortal
        </a>
      </div>
    </nav>

    <main class="main-content">{% block content %} {% endblock %}</main>

    <footer>&copy; 2026 Student Management Portal. All rights reserved.</footer>
  </body>
</html>
